<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu de Landings</title>
  <style>
    :root {
      --bg: #f2f4f8;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-hover: #115e59;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #e7eef7 0%, var(--bg) 45%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: min(820px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(2, 8, 23, 0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .picker {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    select,
    button {
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
    }

    select {
      min-width: 220px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
    }

    button {
      padding: 0 16px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover { background: var(--accent-hover); }

    .links {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
    }

    .link {
      display: grid;
      place-items: center;
      height: 46px;
      text-decoration: none;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
      background: #fff;
    }

    .link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Menu de Landings</h1>
    <p>Selecciona un numero para abrir su pagina.</p>

    <div class="picker">
      <label for="landing" class="sr-only" style="position:absolute;left:-9999px;">Numero de landing</label>
      <select id="landing">
        <option value="">Elige un numero...</option>
        <option value="3">Landing 3</option>
        <option value="4">Landing 4</option>
        <option value="6">Landing 6</option>
        <option value="10">Landing 10</option>
        <option value="11">Landing 11</option>
        <option value="12">Landing 12</option>
        <option value="14">Landing 14</option>
        <option value="15">Landing 15</option>
        <option value="22">Landing 22</option>
        <option value="33">Landing 33</option>
        <option value="38">Landing 38</option>
        <option value="40">Landing 40</option>
        <option value="41">Landing 41</option>
        <option value="45">Landing 45</option>
        <option value="50">Landing 50</option>
      </select>
      <button id="openBtn" type="button">Abrir</button>
    </div>

    <section class="links" aria-label="Accesos directos">
      <a class="link" href="./3/index.html">3</a>
      <a class="link" href="./4/index.html">4</a>
      <a class="link" href="./6/index.html">6</a>
      <a class="link" href="./10/index.html">10</a>
      <a class="link" href="./11/index.html">11</a>
      <a class="link" href="./12/index.html">12</a>
      <a class="link" href="./14/index.html">14</a>
      <a class="link" href="./15/index.html">15</a>
      <a class="link" href="./22/index.html">22</a>
      <a class="link" href="./33/index.html">33</a>
      <a class="link" href="./38/index.html">38</a>
      <a class="link" href="./40/index.html">40</a>
      <a class="link" href="./41/index.html">41</a>
      <a class="link" href="./45/index.html">45</a>
      <a class="link" href="./50/index.html">50</a>
    </section>
  </main>

  <script>
    const select = document.getElementById('landing');
    const button = document.getElementById('openBtn');

    function openSelectedLanding() {
      if (!select.value) return;
      window.location.href = `./${select.value}/index.html`;
    }

    button.addEventListener('click', openSelectedLanding);
    select.addEventListener('change', openSelectedLanding);
  </script>
</body>
</html>
