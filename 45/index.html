<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design, Create, Passion</title>
  <link rel="stylesheet" href="CSS/style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@300;400;600;700;800&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div class="grid">
    <div class="hero">
      <img src="media/Image left.png" alt="hero background" class="hero__bg" />

      <div class="hero__content">
        <h1>
          Design, create,<br />
          and be passionate
        </h1>

        <p>
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Cursus imperdiet sed idt.
        </p>

        <a href="#" class="btn">Get started</a>
      </div>
    </div>

    <div class="mac">
      <div class="mac__num">
        <span class="num">01</span>
        <span class="label">Discover the world</span>
      </div>

      <img src="media/Image right.png" alt="Mac" class="mac__img" />
    </div>

    <div class="bottom">
      <div class="small">
        <div class="small__num">
          <span class="num">02</span>
          <span class="label">Go with your heart</span>
        </div>

        <img src="media/Image bottom left - left.png" alt="" />
      </div>

      <div class="small">
        <div class="small__num">
          <span class="num">03</span>
          <span class="label">Live a full life</span>
        </div>

        <img src="media/right tikiright.png" alt="" />
      </div>
    </div>
  </div>
</body>
</html>
